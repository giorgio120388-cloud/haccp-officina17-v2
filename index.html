<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACCP Officina 17</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>HACCP Officina 17</h1>

<div id="login">
    <h2>Accesso</h2>
    <input type="password" id="pin" placeholder="PIN">
    <button onclick="login()">Entra</button>
</div>

<div id="app" style="display:none;">
    <h2>Registro temperature</h2>

    <select id="frigo">
        <option>Frigo bar</option>
        <option>Vetrina frollatura</option>
        <option>Frigo 1</option>
        <option>Frigo 2</option>
        <option>Congelatore</option>
    </select>

    <input type="number" id="temp" placeholder="Temperatura">

    <button onclick="salva()">Salva</button>

    <ul id="lista"></ul>

    <button onclick="esportaPDF()">Esporta PDF</button>
</div>

<script src="app.js"></script>

</body>
</html>
